<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh Railway - Payment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link id="themeStylesheet" rel="stylesheet" href="default.css"> <!-- Default Theme -->
    <script src="theme.js" defer></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">Bangladesh Railway</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero bg-primary text-white text-center py-5">
        <div class="container">
            <h1 class="display-4">Hello Sir,</h1>
            <p>Select your payment method to proceed.</p>
            <a href="#payment-methods" class="btn btn-light btn-lg mt-4">Select Payment Method</a>
        </div>
    </section>

    <!-- Payment Method Selection -->
    <section id="payment-methods" class="text-center py-5">
        <div class="container">
            <h2>Select Your Payment Method</h2>
            <div class="row">
                <div class="col-md-6">
                    <div class="payment-option bKash" id="bKashOption">
                        <h4>bKash</h4>
                        <p>Select to pay with bKash</p>
                        <p><strong>Payment Number:</strong> <span id="bkash-number">+8801766512823</span></p>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 Bangladesh Railway. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
