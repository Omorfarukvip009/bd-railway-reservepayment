<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body>

<h2>Admin Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<h2>Update Settings</h2>
<input id="bkash" placeholder="bKash Number"><br>
<input id="amount" type="number" placeholder="Amount"><br>

<button onclick="save()">Save</button>
<button onclick="showSite()">SHOW</button>
<button onclick="hideSite()">HIDE</button>

<script>
async function login(){
  await fetch("/api/admin/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({
      email:document.getElementById("email").value,
      password:document.getElementById("password").value
    })
  });
}

async function save(){ await update(true); }
async function showSite(){ await update(true); }
async function hideSite(){ await update(false); }

async function update(enabled){
  await fetch("/api/admin/config",{
    method:"PUT",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({
      bkashNumber:document.getElementById("bkash").value,
      payableAmount:Number(document.getElementById("amount").value),
      siteEnabled: enabled
    })
  });
}
</script>

</body>
</html>
